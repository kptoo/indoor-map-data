<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airport Indoor Routing Demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  #header {
    background: #16213e; padding: 10px 16px; display: flex;
    align-items: center; gap: 12px; flex-wrap: wrap;
    border-bottom: 2px solid #0f3460; z-index: 1000;
  }
  #header h1 { font-size: 15px; color: #e94560; white-space: nowrap; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { font-size: 12px; color: #aaa; }
  select, button {
    background: #0f3460; color: #eee; border: 1px solid #e94560;
    border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid #e94560; }
  button:hover { background: #e94560; color: #fff; }
  .level-btn {
    padding: 5px 12px; border-radius: 4px; font-size: 12px;
    background: #0f3460; color: #aaa; border: 1px solid #0f3460;
  }
  .level-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #status-bar {
    background: #0f3460; padding: 6px 16px; font-size: 12px;
    color: #aaa; min-height: 28px; border-bottom: 1px solid #16213e;
  }
  #status-bar span { color: #e94560; font-weight: bold; }
  #map { flex: 1; }
  #legend {
    position: absolute; bottom: 24px; right: 10px;
    background: rgba(22,33,62,0.93); border: 1px solid #0f3460;
    border-radius: 6px; padding: 10px 14px; font-size: 11px;
    z-index: 1000; min-width: 130px;
  }
  #legend h4 { color: #e94560; margin-bottom: 6px; font-size: 12px; }
  .leg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
  .leg-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leg-line { width: 22px; height: 3px; flex-shrink: 0; border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <h1 id="header-title">🛫 Indoor Routing</h1>
  <div class="ctrl-group">
    <label>Terminal:</label>
    <select id="sel-terminal">
      <option value="T1">Terminal 1</option>
      <option value="T2">Terminal 2</option>
      <option value="T3">Terminal 3</option>
      <option value="T4">Terminal 4</option>
      <option value="T6">Terminal 6</option>
      <option value="T7">Terminal 7</option>
      <option value="T8">Terminal 8</option>
      <option value="TB">Terminal B</option>
      <option value="Reg">Terminal Regional</option>
      <option value="W">Terminal W Gates</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Level:</label>
    <button class="level-btn" data-level="1">L1</button>
    <button class="level-btn" data-level="2">L2</button>
    <button class="level-btn active" data-level="3">L3</button>
  </div>
  <div class="ctrl-group">
    <label>From:</label>
    <select id="sel-from"><option value="">— select —</option></select>
  </div>
  <div class="ctrl-group">
    <label>To:</label>
    <select id="sel-to"><option value="">— select —</option></select>
  </div>
  <button id="btn-route">Find Route</button>
  <button id="btn-clear">Clear</button>
</div>

<div id="status-bar">Ready — choose a terminal &amp; level, pick From &amp; To, then click <b>Find Route</b>.</div>
<div id="map"></div>

<div id="legend">
  <h4>Legend</h4>
  <div class="leg-item"><div class="leg-line" style="background:#4fc3f7"></div> Corridor</div>
  <div class="leg-item"><div class="leg-dot" style="background:#e94560"></div> Gate</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffb300"></div> Food &amp; Beverage</div>
  <div class="leg-item"><div class="leg-dot" style="background:#66bb6a"></div> Shop</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ab47bc"></div> Restroom</div>
  <div class="leg-item"><div class="leg-dot" style="background:#26c6da"></div> Service</div>
  <div class="leg-item" style="margin-top:4px">
    <div style="width:22px;height:4px;border-top:3px dashed #ff5722;flex-shrink:0"></div> Route
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ─── TERMINAL CONFIG ──────────────────────────────────────────────────────────
const TERMINALS = {
  T1:  { label:'Terminal 1',        folder:'Terminal_1'        },
  T2:  { label:'Terminal 2',        folder:'Terminal_2'        },
  T3:  { label:'Terminal 3',        folder:'Terminal_3'        },
  T4:  { label:'Terminal 4',        folder:'Terminal_4'        },
  T6:  { label:'Terminal 6',        folder:'Terminal_6'        },
  T7:  { label:'Terminal 7',        folder:'Terminal_7'        },
  T8:  { label:'Terminal 8',        folder:'Terminal_8'        },
  TB:  { label:'Terminal B',        folder:'Terminal_B'        },
  Reg: { label:'Terminal Regional', folder:'Terminal_Regional' },
  W:   { label:'Terminal W Gates',  folder:'Terminal_Wgates'   },
};

function getFiles(termKey) {
  const { folder } = TERMINALS[termKey];
  const base = folder + '/';
  return {
    graph    : base + 'graph.json',
    gates    : base + termKey + '_gates.geojson',
    food     : base + termKey + '_food_beverage.geojson',
    shops    : base + termKey + '_shops.geojson',
    restrooms: base + termKey + '_restrooms.geojson',
    service  : base + termKey + '_service.geojson',
    services : base + termKey + '_services.geojson',
    vert     : base + termKey + '_vertical_circulation.geojson',
    corridors: base + termKey + '_corridors.geojson',
    connect  : base + termKey + '_Connect.geojson',
    building : base + termKey + '_building.geojson',
  };
}

// ─── MAP INIT ────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 22
}).addTo(map);

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTerminal = 'T1';
let currentLevel    = '3';
let allData    = {};
let graphData  = null;
let graphAdj   = {};    // pre-built adjacency for current level
let graphNodes = {};    // id → {lng,lat} for current level
let poiList    = [];
let mapLayers  = [];
let routeLayer = null;
let markerFrom = null, markerTo = null;

const statusEl = document.getElementById('status-bar');
function setStatus(msg) { statusEl.innerHTML = msg; }

// ─── DISTANCE (metres) ───────────────────────────────────────────────────────
function dist(a, b) {
  const dx = (a[0]-b[0]) * Math.cos((a[1]+b[1])*0.5*Math.PI/180) * 111320;
  const dy = (a[1]-b[1]) * 110540;
  return Math.sqrt(dx*dx + dy*dy);
}

// ─── LOAD ────────────────────────────────────────────────────────────────────
async function loadAll() {
  setStatus('Loading data…');
  allData   = {};
  graphData = null;

  const FILES = getFiles(currentTerminal);
  const entries = await Promise.all(
    Object.entries(FILES).map(async ([key, file]) => {
      try {
        const r = await fetch(file);
        if (!r.ok) throw new Error(r.status);
        return [key, await r.json()];
      } catch(e) {
        console.warn('Could not load', file, e.message);
        return [key, key === 'graph' ? null : { type:'FeatureCollection', features:[] }];
      }
    })
  );

  entries.forEach(([k, v]) => {
    if (k === 'graph') graphData = v;
    else allData[k] = v;
  });

  if (!graphData) {
    setStatus('⚠️ graph.json not found — run build_graph.py first.');
    return;
  }

  buildPoiList();
  renderLevel(currentLevel);
  setStatus('Data loaded. Select From &amp; To and click <b>Find Route</b>.');
}

// ─── GEOMETRY HELPERS ────────────────────────────────────────────────────────
function centroid(geom) {
  if (!geom) return null;
  if (geom.type === 'Point') return [geom.coordinates[0], geom.coordinates[1]];
  const pts = [];
  function collect(c) {
    if (typeof c[0] === 'number') { pts.push(c); return; }
    c.forEach(collect);
  }
  collect(geom.coordinates);
  if (!pts.length) return null;
  return [
    pts.reduce((s,p)=>s+p[0],0)/pts.length,
    pts.reduce((s,p)=>s+p[1],0)/pts.length
  ];
}

function closestPointOnSegment(p, a, b) {
  const dx = b[0]-a[0], dy = b[1]-a[1];
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return { pt: a, t: 0 };
  let t = ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return { pt: [a[0]+t*dx, a[1]+t*dy], t };
}

// ─── POI LIST ────────────────────────────────────────────────────────────────
function buildPoiList() {
  poiList = [];
  const sources = [
    { key:'gates',     type:'gate'     },
    { key:'food',      type:'food'     },
    { key:'shops',     type:'shop'     },
    { key:'restrooms', type:'restroom' },
    { key:'service',   type:'service'  },
    { key:'services',  type:'service'  },
    { key:'vert',      type:'vertical' },
  ];
  let uid = 0;
  sources.forEach(({key, type}) => {
    const fc = allData[key];
    if (!fc) return;
    fc.features.forEach(f => {
      const c = centroid(f.geometry);
      if (!c) return;
      const p   = f.properties || {};
      const lvl = String(p.level || p.Level || '3');
      const name= p.name || p.feature_id || (type+'_'+uid);
      poiList.push({ id: uid++, type, level: lvl, centroid: c, name });
    });
  });
}

// ─── SELECTS ─────────────────────────────────────────────────────────────────
function populateSelects(level) {
  const from = document.getElementById('sel-from');
  const to   = document.getElementById('sel-to');
  const prevFrom = from.value, prevTo = to.value;
  from.innerHTML = '<option value="">— select From —</option>';
  to.innerHTML   = '<option value="">— select To —</option>';

  const relevant = poiList.filter(p => p.level === level);
  const groups   = {};
  relevant.forEach(p => (groups[p.type] = groups[p.type] || []).push(p));

  Object.entries(groups).forEach(([type, items]) => {
    const label = type.charAt(0).toUpperCase() + type.slice(1);
    const og1 = document.createElement('optgroup'); og1.label = label;
    const og2 = document.createElement('optgroup'); og2.label = label;
    items.forEach(p => {
      og1.appendChild(new Option(p.name, p.id));
      og2.appendChild(new Option(p.name, p.id));
    });
    from.appendChild(og1);
    to.appendChild(og2);
  });

  if ([...from.options].some(o=>o.value==prevFrom)) from.value = prevFrom;
  if ([...to.options  ].some(o=>o.value==prevTo  )) to.value   = prevTo;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function clearLayers() { mapLayers.forEach(l=>map.removeLayer(l)); mapLayers=[]; }
function addLayer(l)   { l.addTo(map); mapLayers.push(l); return l; }

function renderLevel(level) {
  clearLayers();
  clearRoute();

  if (allData.building?.features?.length) {
    addLayer(L.geoJSON(allData.building, {
      style: { color:'#334466', fillColor:'#1e2d4a', fillOpacity:0.5, weight:1.5 }
    }));
  }

  ['corridors','connect'].forEach(key => {
    const features = (allData[key]?.features||[]).filter(f =>
      String(f.properties?.Level||f.properties?.level||'3') === level);
    if (!features.length) return;
    addLayer(L.geoJSON({type:'FeatureCollection',features}, {
      style: {
        color:    '#4fc3f7',
        weight:   key==='corridors' ? 3   : 1.5,
        opacity:  key==='corridors' ? 0.7 : 0.4,
        dashArray:key==='connect'   ? '4 4' : null
      }
    }));
  });

  const poiStyles = {
    gate:'#e94560', food:'#ffb300', shop:'#66bb6a',
    restroom:'#ab47bc', service:'#26c6da', vertical:'#78909c'
  };
  const typeMap = {
    gates:'gate', food:'food', shops:'shop', restrooms:'restroom',
    service:'service', services:'service', vert:'vertical'
  };

  ['gates','food','shops','restrooms','service','services','vert'].forEach(key => {
    const features = (allData[key]?.features||[]).filter(f =>
      String(f.properties?.level||f.properties?.Level||'3') === level);
    if (!features.length) return;
    const color = poiStyles[typeMap[key]] || '#aaa';
    addLayer(L.geoJSON({type:'FeatureCollection',features},{
      style: { color, fillColor:color, weight:1, fillOpacity:0.5, opacity:0.9 },
      onEachFeature(f, layer) {
        const name = f.properties?.name || f.properties?.feature_id || 'POI';
        layer.bindTooltip(name, { sticky:true, className:'poi-tip' });
      }
    }));
  });

  populateSelects(level);

  // Pre-build adjacency for this level (fast lookup at route time)
  buildLevelAdjacency(level);

  try {
    const src = allData.building?.features?.length
      ? allData.building
      : { type:'FeatureCollection',
          features:(allData.corridors?.features||[]).filter(f=>
            String(f.properties?.Level||f.properties?.level||'3')===level) };
    if (src.features?.length) map.fitBounds(L.geoJSON(src).getBounds(), {padding:[30,30]});
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════════════
// GRAPH / ROUTING
// ═══════════════════════════════════════════════════════════════════════════════

// Build adjacency + node lookup for the given level from graphData
function buildLevelAdjacency(level) {
  graphAdj   = {};
  graphNodes = {};
  if (!graphData) return;

  Object.entries(graphData.nodes).forEach(([id, n]) => {
    if (String(n.level) === level) {
      graphNodes[id] = n;
      graphAdj[id]   = [];
    }
  });

  graphData.edges.forEach(e => {
    if (String(e.level) !== level) return;
    if (!graphAdj[e.from] || !graphAdj[e.to]) return;
    graphAdj[e.from].push({ to: e.to,   cost: e.cost });
    graphAdj[e.to  ].push({ to: e.from, cost: e.cost });
  });
}

// ── Edge-snap ─────────────────────────────────────────────────────────────────
// Finds the closest point on ANY graph edge to [lng, lat].
// Injects a temporary virtual node at that foot-point and connects it to
// both endpoints of the hosting edge. Returns the virtual node id.
//
// This guarantees the route always starts/ends exactly on the corridor line,
// not just at the nearest node which may be on a different branch.

let _virtualCounter = 0;

function snapToEdge(lng, lat) {
  const pt = [lng, lat];
  let bestDist = Infinity;
  let bestFoot = null;
  let bestA = null, bestB = null;

  // Check every edge for the closest foot-point
  const seen = new Set();
  for (const [idA, neighbours] of Object.entries(graphAdj)) {
    const nA = graphNodes[idA];
    for (const { to: idB } of neighbours) {
      const edgeKey = idA < idB ? `${idA}|${idB}` : `${idB}|${idA}`;
      if (seen.has(edgeKey)) continue;
      seen.add(edgeKey);

      const nB = graphNodes[idB];
      const { pt: foot } = closestPointOnSegment(
        pt,
        [nA.lng, nA.lat],
        [nB.lng, nB.lat]
      );
      const d = dist(pt, foot);
      if (d < bestDist) {
        bestDist = d;
        bestFoot = foot;
        bestA = idA;
        bestB = idB;
      }
    }
  }

  if (!bestFoot) {
    // Fallback: snap to nearest node
    return snapToNearestNode(lng, lat);
  }

  // Also check nearest node — if it's closer than the edge foot, use it directly
  const { id: nearestId, d: nearestDist } = snapToNearestNode(lng, lat, true);
  if (nearestDist <= bestDist + 0.5) {
    return nearestId;
  }

  // Inject virtual node at foot-point
  const vid = '__v' + (_virtualCounter++);
  const footLng = bestFoot[0], footLat = bestFoot[1];
  graphNodes[vid] = { lng: footLng, lat: footLat, level: graphNodes[bestA].level };
  graphAdj[vid]   = [];

  // Cost from foot to each endpoint
  const costA = dist(bestFoot, [graphNodes[bestA].lng, graphNodes[bestA].lat]);
  const costB = dist(bestFoot, [graphNodes[bestB].lng, graphNodes[bestB].lat]);

  graphAdj[vid].push({ to: bestA, cost: costA });
  graphAdj[vid].push({ to: bestB, cost: costB });
  graphAdj[bestA].push({ to: vid, cost: costA });
  graphAdj[bestB].push({ to: vid, cost: costB });

  return vid;
}

function snapToNearestNode(lng, lat, returnMeta = false) {
  const pt = [lng, lat];
  let bestId = null, bestDist = Infinity;
  for (const [id, n] of Object.entries(graphNodes)) {
    const d = dist(pt, [n.lng, n.lat]);
    if (d < bestDist) { bestDist = d; bestId = id; }
  }
  return returnMeta ? { id: bestId, d: bestDist } : bestId;
}

// ── Dijkstra ──────────────────────────────────────────────────────────────────
function dijkstra(startId, endId) {
  const dist2   = { [startId]: 0 };
  const prev    = {};
  const visited = new Set();
  const pq      = [[0, startId]];

  while (pq.length) {
    pq.sort((a,b) => a[0]-b[0]);
    const [d, u] = pq.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    if (u === endId) break;
    for (const { to: v, cost } of (graphAdj[u] || [])) {
      if (visited.has(v)) continue;
      const nd = d + cost;
      if (dist2[v] === undefined || nd < dist2[v]) {
        dist2[v] = nd; prev[v] = u;
        pq.push([nd, v]);
      }
    }
  }

  if (dist2[endId] === undefined) return null;

  // Reconstruct — prev[] walkback is exact, no overshoot
  const path = [];
  let cur = endId;
  while (cur !== undefined) {
    const n = graphNodes[cur];
    path.unshift([n.lng, n.lat]);
    cur = prev[cur];
  }
  return { path, dist: dist2[endId] };
}

// ── Clean up virtual nodes after routing ─────────────────────────────────────
function removeVirtualNodes() {
  for (const id of Object.keys(graphNodes)) {
    if (!id.startsWith('__v')) continue;
    // Remove from neighbours' adjacency lists
    for (const { to } of graphAdj[id] || []) {
      if (graphAdj[to]) {
        graphAdj[to] = graphAdj[to].filter(e => e.to !== id);
      }
    }
    delete graphNodes[id];
    delete graphAdj[id];
  }
  _virtualCounter = 0;
}

// ─── ROUTE HANDLER ───────────────────────────────────────────────────────────
function clearRoute() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (markerFrom) { map.removeLayer(markerFrom); markerFrom = null; }
  if (markerTo)   { map.removeLayer(markerTo);   markerTo   = null; }
}

function makeMarker(latlng, color, label) {
  return L.circleMarker(latlng, {
    radius:10, color:'#fff', weight:2, fillColor:color, fillOpacity:1
  }).bindTooltip(label, { permanent:true, direction:'top',
    className:'route-label', offset:[0,-12] });
}

document.getElementById('btn-route').addEventListener('click', () => {
  const fromId = document.getElementById('sel-from').value;
  const toId   = document.getElementById('sel-to').value;
  if (!fromId || !toId) { setStatus('⚠️ Please select both <b>From</b> and <b>To</b> points.'); return; }
  if (fromId === toId)  { setStatus('⚠️ From and To are the same location.'); return; }

  const fromPoi = poiList.find(p=>String(p.id)===String(fromId));
  const toPoi   = poiList.find(p=>String(p.id)===String(toId));
  if (!fromPoi||!toPoi) { setStatus('⚠️ Could not find selected POIs.'); return; }
  if (!graphData)       { setStatus('⚠️ graph.json not loaded.'); return; }

  setStatus('Computing route…');
  clearRoute();
  removeVirtualNodes(); // clean up any leftover virtual nodes from last route

  if (!Object.keys(graphNodes).length) {
    setStatus('⚠️ No graph nodes for this level.'); return;
  }

  // Snap each POI to the nearest edge (exact corridor geometry entry point)
  const fromNodeId = snapToEdge(fromPoi.centroid[0], fromPoi.centroid[1]);
  const toNodeId   = snapToEdge(toPoi.centroid[0],   toPoi.centroid[1]);

  if (!fromNodeId || !toNodeId) {
    setStatus('⚠️ Could not snap POIs to graph.'); return;
  }

  const result = dijkstra(fromNodeId, toNodeId);

  // Clean up virtual nodes so next route starts with a clean graph
  removeVirtualNodes();

  if (!result) {
    setStatus('❌ No route found between these two points.'); return;
  }

  const latlngs = result.path.map(p => [p[1], p[0]]);
  routeLayer = L.polyline(latlngs, {
    color:'#ff5722', weight:5, opacity:0.9, dashArray:'10 6'
  }).addTo(map);

  markerFrom = makeMarker([fromPoi.centroid[1],fromPoi.centroid[0]], '#00e676', '🟢 '+fromPoi.name).addTo(map);
  markerTo   = makeMarker([toPoi.centroid[1],  toPoi.centroid[0]  ], '#e94560', '🔴 '+toPoi.name).addTo(map);

  map.fitBounds(routeLayer.getBounds(), {padding:[60,60]});

  const metres = Math.round(result.dist);
  const mins   = Math.max(1, Math.round(metres / 80));
  setStatus(`✅ Route: <span>${metres} m</span> · ~<span>${mins} min</span> walk &nbsp;|&nbsp; ${fromPoi.name} → ${toPoi.name}`);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  clearRoute();
  removeVirtualNodes();
  document.getElementById('sel-from').value = '';
  document.getElementById('sel-to').value   = '';
  setStatus('Cleared. Select From &amp; To and click <b>Find Route</b>.');
});

// ─── LEVEL BUTTONS ───────────────────────────────────────���───────────────────
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
    renderLevel(currentLevel);
    setStatus(`Switched to Level ${currentLevel}.`);
  });
});

// ─── TERMINAL SELECTOR ───────────────────────────────────────────────────────
document.getElementById('sel-terminal').addEventListener('change', function() {
  currentTerminal = this.value;
  const label = TERMINALS[currentTerminal].label;
  document.getElementById('header-title').textContent = '🛫 ' + label + ' · Indoor Routing';
  document.title = label + ' – Indoor Routing Demo';
  clearRoute();
  loadAll();
});

// ─── STYLES ──────────────────────────────────────────────────────────────────
const s = document.createElement('style');
